# DeskPad — Development Docker Compose
# Usage: make dev (or docker compose -f docker-compose.dev.yml up --build)
#
# Frontend: Vite dev server with HMR at http://localhost:5173
# Backend:  FastAPI with auto-reload at http://localhost:3001
# API docs: http://localhost:3001/api/docs

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/public:/app/public
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_API_PROXY_TARGET=http://backend:3001
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - deskpad-dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    environment:
      - ENVIRONMENT=development
      - PORT=3001
      - DB_PATH=/data/deskpad.db
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
    volumes:
      - ./backend/app:/app/app
      - dev_db_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - deskpad-dev

volumes:
  dev_db_data:
    driver: local

networks:
  deskpad-dev:
    driver: bridge
